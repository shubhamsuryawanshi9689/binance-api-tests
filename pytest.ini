[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -ra --strict-markers --tb=short
markers =
    websocket: tests that connect to Binance WebSocket streams (slower, network-bound)
    smoke: minimal connectivity checks — run first in CI
    market_data: REST market-data endpoints (ticker, depth, klines, trades)
